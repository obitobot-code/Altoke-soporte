<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando Altoke - BancoSol</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #00a859;
            --bg-color: #ffffff;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Contenedor del Círculo de Carga y el Logo */
        .loader-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Círculo SVG animado */
        .circular-loader {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotate 2s linear infinite;
        }

        .circular-loader circle {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            transform-origin: center;
        }

        .loader-bg {
            stroke: #f0f0f0;
        }

        .loader-path {
            stroke: var(--secondary-color);
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            animation: dash 1.5s ease-in-out infinite;
        }

        /* Imagen Logo en el centro */
        .logo-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            border-radius: 50%;
            z-index: 2;
        }

        .loading-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .loading-subtext {
            font-size: 13px;
            color: #777;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 200;
                stroke-dashoffset: 0;
            }
            50% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -35;
            }
            100% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -124;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader-wrapper">
            <!-- Círculo de Carga -->
            <svg class="circular-loader" viewBox="25 25 50 50">
                <circle class="loader-bg" cx="50" cy="50" r="20"></circle>
                <circle class="loader-path" cx="50" cy="50" r="20"></circle>
            </svg>
            <!-- Imagen logo.webp en el centro -->
            <img src="logo.webp" alt="Logo BancoSol Altoke" class="logo-img" onerror="this.style.display='none';">
        </div>

        <div class="loading-text">Abriendo Altoke...</div>
        <div class="loading-subtext">BancoSol</div>
    </div>

    <script>
        // Después de exactamente 3 segundos, redirige a la aplicación oficial en Play Store
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                window.location.href = "https://play.google.com/store/apps/details?id=com.bancosol.altoke";
            }, 3000); // 3000 milisegundos = 3 segundos
        });
    </script>
</body>
</html>
